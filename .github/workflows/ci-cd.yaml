name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run Linter
        run: npm run lint
        working-directory: backend

      - name: Run Integration Tests
        run: npm test
        working-directory: backend
        env:
          PORT: 5000
          MONGO_URI: mongodb://localhost:27017/task_platform_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: testsecretkeyformockjwtverification
          RATE_LIMIT_WINDOW_MS: 900000
          RATE_LIMIT_MAX: 1000

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repository Owner for Docker Tag
        run: |
          echo "REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/task-platform-backend:${{ github.sha }}
            ghcr.io/${{ env.REPO_OWNER }}/task-platform-backend:latest

      - name: Build and Push Worker Image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/task-platform-worker:${{ github.sha }}
            ghcr.io/${{ env.REPO_OWNER }}/task-platform-worker:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          build-args: |
            VITE_API_URL=https://task-platform.yourdomain.com
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/task-platform-frontend:${{ github.sha }}
            ghcr.io/${{ env.REPO_OWNER }}/task-platform-frontend:latest

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/task-platform-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra

      - name: Downcase Repository Owner
        run: |
          echo "REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Update deployment image tags using yq
        run: |
          # Install yq
          sudo wget -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          # Update backend deployment
          yq -i '.spec.template.spec.containers[0].image = "ghcr.io/${{ env.REPO_OWNER }}/task-platform-backend:${{ github.sha }}"' infra/manifests/services/backend-deployment.yaml

          # Update worker deployment
          yq -i '.spec.template.spec.containers[0].image = "ghcr.io/${{ env.REPO_OWNER }}/task-platform-worker:${{ github.sha }}"' infra/manifests/services/worker-deployment.yaml

          # Update frontend deployment
          yq -i '.spec.template.spec.containers[0].image = "ghcr.io/${{ env.REPO_OWNER }}/task-platform-frontend:${{ github.sha }}"' infra/manifests/services/frontend-deployment.yaml

      - name: Commit and push changes to infra repository
        run: |
          cd infra
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add manifests/services/
          git diff-index --quiet HEAD || git commit -m "chore: bump application image tags to ${{ github.sha }} [skip ci]"
          git push origin main
