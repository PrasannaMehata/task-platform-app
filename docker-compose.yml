version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: task-platform-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: task-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-platform-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/task_platform
      - MONGODB_URI=mongodb://mongo:27017/task_platform
      - REDIS_URL=redis://redis:6379
      - FRONTEND_ORIGIN=http://localhost:8080,http://localhost:8082
      - JWT_SECRET=supersecretjwtkeyforprodtesting
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: task-platform-worker
    environment:
      - MONGO_URI=mongodb://mongo:27017/task_platform
      - MONGODB_URI=mongodb://mongo:27017/task_platform
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: task-platform-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
